<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sudoku Solver</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2em; }
    #loader { display: none; }
    #error { color: red; margin-top: 1em; }
    #resultImage { max-width: 90%; margin-top: 1em; display: none; }
  </style>
</head>
<body>

  <h1>🧩 Sudoku Solver</h1>
  <input type="file" id="imageInput" accept="image/*">
  <br><br>
  <button onclick="uploadImage()">Solve</button>

  <div id="loader">⏳ Solving... Please wait</div>
  <div id="error"></div>
  <img id="resultImage" src="" alt="Solved Sudoku">

  <script>
    const BACKEND_URL = "https://sudoku-solver-backend-bxg0.onrender.com"; // Change if needed

    async function uploadImage() {
      const input = document.getElementById("imageInput");
      const loader = document.getElementById("loader");
      const error = document.getElementById("error");
      const resultImage = document.getElementById("resultImage");

      error.textContent = "";
      resultImage.style.display = "none";

      if (!input.files[0]) {
        error.textContent = "Please select an image first.";
        return;
      }

      const formData = new FormData();
      formData.append("image", input.files[0]);

      loader.style.display = "block";

      try {
        const response = await fetch(`${BACKEND_URL}/predict`, {
          method: "POST",
          body: formData
        });

        if (!response.ok) {
          throw new Error(`Backend error: ${response.status} ${response.statusText}`);
        }

        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        resultImage.src = `data:image/png;base64,${data.solved_image}`;
        resultImage.style.display = "block";
      } catch (err) {
        console.error("Frontend error:", err);
        error.textContent = "❌ Error: " + err.message;
      } finally {
        loader.style.display = "none";
      }
    }
  </script>

</body>
</html>
